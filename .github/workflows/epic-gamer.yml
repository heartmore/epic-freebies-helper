name: Epic Awesome Gamer (Scheduled)


on:
  workflow_dispatch: # 手动触发
  schedule:
    # 每两天 UTC 15:20 运行一次（北京时间 23:20）
    # 使用 GitHub Actions 可支持的近似方案：按每隔 2 天的日历节奏触发。
    - cron: '20 15 */2 * *'→ Runs at 15:20, only on Thursday



env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  epic-gamer:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    # 默认不在主仓库自身执行定时任务；Fork 后的仓库会正常运行。
    if: github.repository != 'Ronchy2000/epic-freebies-helper'


    steps:
      - name: Checkout repository
        uses: actions/checkout@v6


      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true


      - name: Set up Python
        run: uv python install 3.12


      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxml2-dev libxslt-dev
